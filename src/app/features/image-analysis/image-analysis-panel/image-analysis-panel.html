@if (data(); as analysis) {
  <div class="analysis-panel-container">
    <app-tab-group>
      <!-- 3.1: Thought Summary -->
      <app-tab id="thought" label="Thought Summary">
        <app-thought-summary
          [alternativeTexts]="analysis.analysis.alternativeTexts"
          [performance]="performance()"
          [displaySource]="displaySource()"
          [thoughtSummary]="analysis.thoughtSummary || 'No technical logs provided.'"
        />
      </app-tab>

      <!-- 3.2: Recommendations -->
      <app-tab id="detailed" label="Recommendations">
        <app-image-recommendation [recommendations]="analysis.analysis.recommendations" />
      </app-tab>

      <!-- 3.3: Token Usage -->
      <app-tab id="tokens" label="Token Usage">
        <app-token-analytics
          [tokenSummary]="this.data()?.tokenSummary"
          [tokenModalityBreakdown]="this.data()?.tokenModalityBreakdown"
        />
      </app-tab>

      <!-- 3.4: Image Improvement -->
      <app-tab id="improvement" label="Image Improvement">
        <app-image-improvement [analysis]="analysis.analysis" [imageUrl]="imageUrl()" />
      </app-tab>
    </app-tab-group>
  </div>
}
