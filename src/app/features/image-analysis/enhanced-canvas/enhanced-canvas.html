<div class="canvas-wrapper">
  <div class="canvas-container" [style.aspect-ratio]="containerAspectRatio()">
    @if (imageUrl(); as url) {
      @let wrapperStyle = containerCss();
      @let imageStyle = imageCss();
      @if (wrapperStyle && imageStyle) {
        <div [style]="wrapperStyle">
          <img
            style="display: block"
            [src]="url"
            (load)="onImageLoad($event)"
            [style.filter]="filterStyle()"
            alt="Cropped subject"
            [style]="imageStyle"
          />
        </div>

        <!-- Download button floating hover -->
        <button
          type="button"
          class="download-enhanced-btn"
          [appDownloadEnhanced]="url"
          [crop]="crop()"
          [filter]="colorAdjustment()"
        >
          <span class="material-symbols-outlined text-lg">download</span>
          Download PNG
        </button>
        <div class="canvas-badge">AI ENHANCED</div>
      } @else {
        <div class="no-image-placeholder">No image improvement available</div>
      }
    } @else {
      <div class="no-image-placeholder">No image selected for preview</div>
    }
  </div>
</div>
